competitors:
- canonical_names:
  - McKinsey & Company
  - McKinsey
  - McKinsey and Company
  competitor: McKinsey & Company
  sources:
  # RSS — official feed + Google News aggregation
  - type: rss
    frequency: 30min
    url: https://www.mckinsey.com/insights/rss
  - type: rss
    frequency: 30min
    url: https://news.google.com/rss/search?q=McKinsey+%26+Company+consulting&hl=en-US&gl=US&ceid=US:en
  # Firecrawl — company-owned content sections (daily crawl for new articles)
  - type: firecrawl
    frequency: daily
    url: https://www.mckinsey.com/insights
  - type: firecrawl
    frequency: daily
    url: https://www.mckinsey.com/about-us/new-at-mckinsey-blog
  - type: firecrawl
    frequency: daily
    url: https://www.mckinsey.com/featured-insights
  - type: firecrawl
    frequency: daily
    url: https://www.mckinsey.com/capabilities/mckinsey-digital/our-insights
  # Tavily — targeted news search + hiring signals
  - type: tavily
    frequency: daily
    query: McKinsey consulting new service practice acquisition partnership announcement 2025 2026
  - type: tavily
    frequency: daily
    query: McKinsey QuantumBlack AI platform product launch announcement
  - type: tavily
    frequency: weekly
    query: McKinsey hiring layoffs restructuring AI practice leadership change 2025 2026
  # Indeed — hiring signals (weekly batch, curious_coder/indeed-scraper)
  - type: apify
    frequency: weekly
    actor: indeed-jobs-scraper
    max_results: 5
    query: McKinsey & Company


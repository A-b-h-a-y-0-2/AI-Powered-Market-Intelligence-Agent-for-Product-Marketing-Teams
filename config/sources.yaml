  - type: companies_house
    entity: McKinsey
    frequency: weekly
    label: McKinsey UK subsidiary annual accounts and director filings
  # Patents — QuantumBlack / McKinsey Labs
  - type: patents
    entity: McKinsey
    frequency: weekly
    label: McKinsey / QuantumBlack patent filings (Lens.org)
  # Litigation — federal cases mentioning McKinsey
  - type: court_listener
    entity: McKinsey
    frequency: weekly
    label: Federal court cases involving McKinsey
  # Research papers — McKinsey Global Institute
  - type: semantic_scholar
    entity: McKinsey & Company
    frequency: weekly
    label: McKinsey Global Institute research papers
  # India news — sourced via RSS (zero-code additions)
  - type: rss
    frequency: daily
    url: https://news.google.com/rss/search?q=McKinsey+India&hl=en-IN&gl=IN&ceid=IN:en

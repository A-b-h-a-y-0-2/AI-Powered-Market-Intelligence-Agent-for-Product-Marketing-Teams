  - type: firecrawl
    frequency: daily
    url: https://www.mckinsey.com/capabilities/quantumblack/our-insights
  # Reddit — community discussion and sentiment (weekly)
  - type: apify
    frequency: weekly
    actor: trudax/reddit-scraper
    input:
      queries:
        - McKinsey consulting AI review
        - McKinsey QuantumBlack AI
        - McKinsey & Company
      subreddits:
        - consulting
        - MBA
        - management
        - BusinessIntelligence
      maxItems: 25
